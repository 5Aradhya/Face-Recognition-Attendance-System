<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>Add Student</title>

  <style>

    body{
    font-familiy:Arial, sans-serif;
    background-color:#f4f6f8;
    display:flex;
    justify-content:center;
    padding:50px;
    }

    .form-box{
    background-color:#ffffff;
    padding:30px 40px;
    border-radius:8px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
    widht:320px;
    }

    h1{
        font -size:22px;
    margin-bottom:20px;
    color:#333;
    }

    label{
    display:block;
    margin-top:12px;
    margin-bottom:4px;
    font-size:14px;
    color:#555;
    }

    input{
    padding:8px 10px;
    width:100%;
    border:1px solid #ccc;
    border-radius:4px;
    font-size:14px;
    }

    button{
    margin-top:20px;
    padding:10px 18px;
    background-color:#2f7dff;
    color:#ffff;
    border:none;
    border-radius:4px;
    font-size:14px;
    cursor:pointer;
    }

    button:hover{
    background-color:#1a63e0;
    }


  </style>

</head>
<body>
<div class="form-box">
<h1>Add New Student</h1>

<form th:action="@{/students/add}" th:object="${student}" method="post">

  <label>Name:</label>
  <input type="text" th:field="*{name}"/><br><br>

  <label>Roll Number</label>
  <input type="text" th:field="*{rollNumber}"/><br><br>

  <label>Email:</label>
  <input type="text" th:field="*{email}"/><br><br>

  <label>PhotoPath:</label>
  <input type="text" th:field="*{photoPath}"/><br><br>

  <button type="submit">Add Student</button>

</form>
</div>

</body>
</html>
