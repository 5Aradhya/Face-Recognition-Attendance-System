<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Face Attendance System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #f4f6f8;
            color: #2c3e50;
        }

        h1 {
            background-color: #2c3e50;
            color: white;
            padding: 20px 30px;
        }

        nav {
            background-color: #34495e;
            padding: 10px 20px;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 20px;
        }

        nav ul li a {
            color: white;
            text-decoration: none;
            padding: 8px 14px;
            border-radius: 4px;
        }

        nav ul li a:hover {
            background-color: #1abc9c;
        }
    </style>
</head>
<body>
<h1>Face Attendance System</h1>

<nav>
    <ul>
        <li><a th:href="@{/students/view}">View Students</a></li>
        <li><a th:href="@{/students/add}">Add Student</a></li>
        <li><a th:href="@{/attendance/view}">View Attendance</a></li>
        <li><a th:href="@{/login}">Login</a></li>
        <li><a th:href="@{/register}">Register</a></li>
    </ul>
</nav>
</body>
</html>
