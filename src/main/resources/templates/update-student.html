<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Title</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .form-container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            width: 350px;
        }
        h2 {
            text-align: center;
            color: #333;
        }
        label {
            display: block;
            margin-top: 15px;
            font-weight: bold;
            color: #555;
        }
        input[type="text"], input[type="email"] {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            margin-top: 20px;
            width: 100%;
            padding: 10px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #45a049;
        }
    </style>


</head>
<body>

<div class="form-container">
    <h2>Update Student</h2>

    <form th:action="@{/students/update/{id}(id=${student.id})}" method="post" th:object="${student}">

        <label>Name</label>
        <input type="text" th:field="*{name}" required>

        <label>Roll Number</label>
        <input type="text" th:field="*{rollNumber}" required>

        <label>Email</label>
        <input type="email" th:field="*{email}" required>

        <label>Photo Path</label>
        <input type="text" th:field="*{photoPath}">

        <button type="submit">Update Student</button>

    </form>
</div>



</body>
</html>
